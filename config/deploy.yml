service: bank-backend

image: yaromir-zhuravsky/bank-backend

servers:
  web:
    - 204.168.229.11

proxy:
  host: api.zhuravsky.dev
  app_port: 3000
  ssl: true

registry:
  server: ghcr.io
  username: yaromir-zhuravsky
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  cache:
    type: gha

env:
  secret:
    - BANK_DATABASE_URL
    - SECRET_KEY_BASE
    - JWT_SECRET

ssh:
  user: root
  key_data:
    - KAMAL_SSH_PRIVATE_KEY

aliases:
  console: app exec -i --reuse "bin/rails console"
